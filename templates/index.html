<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Live Camera - Broadcast Output</title>
    <link rel="stylesheet" href="/static/css/style.css">
    
    <!-- Global JS Error Overlay for Debugging -->
    <script>
        window.onerror = function(msg, url, line, col, error) {
            const errDiv = document.createElement('div');
            errDiv.style.position = 'fixed';
            errDiv.style.top = '10px';
            errDiv.style.left = '10px';
            errDiv.style.backgroundColor = 'rgba(255, 30, 30, 0.95)';
            errDiv.style.color = 'white';
            errDiv.style.padding = '15px';
            errDiv.style.zIndex = '99999';
            errDiv.style.fontFamily = 'monospace';
            errDiv.style.borderRadius = '8px';
            errDiv.style.border = '2px solid white';
            errDiv.style.boxShadow = '0 0 20px rgba(0,0,0,0.5)';
            errDiv.style.fontSize = '12px';
            errDiv.style.maxWidth = '90vw';
            errDiv.style.wordBreak = 'break-all';
            errDiv.innerHTML = `<strong>Dashboard JS Error:</strong> ${msg}<br><strong>File:</strong> ${url}<br><strong>Line:</strong> ${line}:${col}<br><br><strong>Stack:</strong> ${error ? error.stack : 'N/A'}`;
            document.body.appendChild(errDiv);
            return false;
        };
    </script>
</head>
<body>
    <div class="dashboard-container" id="dashboard">
        <!-- Dual Video Players for Seamless Broadcast Mix Transitions -->
        <div id="player-container-a" class="player-container active">
            <div id="player-a"></div>
        </div>
        <div id="player-container-b" class="player-container">
            <div id="player-b"></div>
        </div>

        <!-- Starred Only Alert Placeholder Overlay -->
        <div id="no-starred-overlay" class="no-starred-overlay" style="display: none;">
            <div class="no-starred-content">
                <svg viewBox="0 0 24 24" width="48" height="48" class="warning-icon">
                    <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
                <h2>No Starred Feeds Active</h2>
                <p>Please select and star camera feeds on the Switcher Console to start the broadcast.</p>
            </div>
        </div>

        <!-- Clock & Info Overlay -->
        <div class="overlay top-right">
            <div class="navigation-controls">
                <button id="prev-btn" title="Previous Video">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                    </svg>
                </button>
                <div class="clock-container">
                    <div id="clock" class="clock-display">00:00:00</div>
                    <div id="date" class="date-display">Wednesday, May 27, 2026</div>
                    <div class="video-meta">
                        <span id="video-id-display">ID: --------</span>
                        <button id="delete-btn" title="Remove from Playlist">
                            <svg viewBox="0 0 24 24" width="16" height="16">
                                <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button id="next-btn" title="Next Video">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="controls bottom-right">
            <button id="fullscreen-btn" title="Toggle Fullscreen">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- YouTube Iframe API Script -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
